# SpritePal Pre-commit Configuration
# Install with: pre-commit install

repos:
  # Python code formatting with ruff (replaces black + flake8)
  # Config in pyproject.toml [tool.ruff]
  - repo: https://github.com/astral-sh/ruff-pre-commit
    rev: v0.8.2
    hooks:
      - id: ruff
        name: ruff linting
        args: [--fix, --exit-non-zero-on-fix]
      - id: ruff-format
        name: ruff formatting

  # Python type checking (uses basedpyright, config in pyproject.toml)
  - repo: local
    hooks:
      - id: basedpyright
        name: basedpyright type checking
        entry: uv run basedpyright
        language: system
        types: [python]
        files: ^spritepal/(core|ui|utils)/
        pass_filenames: false

  # General file checks
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
        name: trim trailing whitespace
      - id: end-of-file-fixer
        name: fix end of files
      - id: check-yaml
        name: check yaml files
      - id: check-toml
        name: check toml files
      - id: check-json
        name: check json files
      - id: check-added-large-files
        name: check for large files
        args: ['--maxkb=1000']
      - id: check-case-conflict
        name: check for case conflicts
      - id: check-merge-conflict
        name: check for merge conflicts
      - id: debug-statements
        name: check for debug statements
      - id: mixed-line-ending
        name: check line endings

  # Security scanning
  - repo: https://github.com/PyCQA/bandit
    rev: 1.7.10
    hooks:
      - id: bandit
        name: bandit security scan
        args: [-r, spritepal/, -f, screen]
        exclude: ^(spritepal/tests/|test_.*\.py$|archive/|obsolete)

  # SpritePal-specific checks
  - repo: local
    hooks:
      - id: spritepal-unit-tests
        name: SpritePal Unit Tests
        entry: python -m pytest spritepal/tests/ -m "unit" --tb=short -q
        language: system
        pass_filenames: false
        always_run: true
        stages: [commit]

      - id: pyside6-imports
        name: check for wrong Qt imports (project uses PySide6)
        entry: 'python -c "import sys,re;[print(f+\": Found PyQt import\") or sys.exit(1) for f in sys.argv[1:] if re.search(r\"from\\s+PyQt[56]|import\\s+PyQt[56]\", open(f).read())]"'
        language: system
        files: \.py$
        exclude: ^(archive/|obsolete)

      - id: sprite-file-size
        name: check sprite file sizes
        entry: 'python -c "import sys,os;[print(f+\": Large (\"+str(os.path.getsize(f)//1048576)+\"MB)\") or sys.exit(1) for f in sys.argv[1:] if os.path.getsize(f)>5242880]"'
        language: system
        files: \.(png|jpg|jpeg)$
        exclude: ^(archive/|obsolete)

# Global configuration
default_stages: [commit]
minimum_pre_commit_version: '3.0.0'
fail_fast: false